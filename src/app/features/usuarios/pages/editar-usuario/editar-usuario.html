<div class="max-w-3xl mx-auto space-y-8 pb-28">

  <!-- HEADER -->
  <div class="flex items-center justify-between">

    <div>
      <h2 class="text-xl font-semibold text-slate-800">
        {{ modo === 'editar' ? 'Editar Usuario' : 'Crear Usuario' }}
      </h2>

      <p class="text-sm text-slate-500">
        {{
          modo === 'editar'
            ? 'Modificación de datos del usuario'
            : 'Registro de un nuevo usuario'
        }}
      </p>
    </div>

    <button
      class="px-4 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 transition"
      (click)="volver()"
    >
      Volver
    </button>

  </div>

  <!-- FORM -->
  <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm space-y-6">

    <div class="grid md:grid-cols-2 gap-6">

      <!-- Nombre -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">
          Nombre
        </label>

        <input
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          [(ngModel)]="model.nombre"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">
          Email
        </label>

        <input
          type="email"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          [(ngModel)]="model.email"
        />
      </div>

      <!-- Identificación -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">
          Identificación
        </label>

        <input
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          [(ngModel)]="model.identificacion"
        />
      </div>

      <!-- Rol -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">
          Rol
        </label>

        <select
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          [(ngModel)]="model.rol"
        >
          <option value="admin">ADMIN</option>
          <option value="admin-local">ADMIN LOCAL</option>
          <option value="staff">STAFF</option>
        </select>
      </div>

    </div>

    <!-- Estado -->
    <div class="flex items-center gap-3">

      <input
        type="checkbox"
        [(ngModel)]="model.estado"
      />

      <span class="text-sm text-slate-700">
        Usuario activo
      </span>

    </div>

    <!-- CONTRASEÑA SOLO CREAR -->
    @if (modo === 'crear') {

      <div class="grid md:grid-cols-2 gap-6">

        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">
            Contraseña
          </label>

          <input
            type="password"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
            [(ngModel)]="model.clave"
          />
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">
            Confirmar contraseña
          </label>

          <input
            type="password"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
            [(ngModel)]="model.confirmarClave"
          />
        </div>

      </div>

    }

    <!-- CONTRASEÑA OPCIONAL EDITAR -->
    @if (modo === 'editar') {

      <div>

        <label class="block text-xs font-medium text-slate-600 mb-1">
          Nueva contraseña (opcional)
        </label>

        <input
          type="password"
          placeholder="Dejar vacío para mantener la actual"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          [(ngModel)]="model.clave"
        />

      </div>

      <div>

        <label class="block text-xs font-medium text-slate-600 mb-1">
          Confirmar contraseña
        </label>

        <input
          type="password"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          [(ngModel)]="model.confirmarClave"
        />

      </div>

    }

  </div>

  <!-- BOTÓN -->
  <div class="flex justify-end">

    <button
      class="px-6 py-2 rounded-lg bg-slate-900 text-white text-sm hover:bg-slate-800 disabled:opacity-60"
      [disabled]="loading"
      (click)="guardar()"
    >

      @if (loading) {
        Guardando...
      } @else {
        {{ modo === 'editar' ? 'Actualizar usuario' : 'Crear usuario' }}
      }

    </button>

  </div>

</div>
