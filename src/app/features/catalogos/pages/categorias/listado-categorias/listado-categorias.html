<div class="p-4 lg:p-8 bg-gray-100 min-h-screen space-y-8">

  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-semibold text-gray-900">Categorías</h1>
      <p class="text-sm text-gray-500">Administración de categorías del sistema</p>
    </div>

    <button
      class="hidden sm:flex bg-black text-white px-5 py-2.5 rounded-xl gap-2"
      (click)="abrirCrear()"
    >
      <lucide-icon name="plus" class="w-4 h-4" />
      Nueva categoría
    </button>
  </div>

  <div class="grid gap-6 sm:grid-cols-2 xl:grid-cols-3">
    @for (c of categorias; track c._id) {
      <div class="bg-white rounded-[28px] p-6 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.25)]">
        <div class="flex justify-between">
          <h3 class="font-semibold text-gray-900">{{ c.nombre }}</h3>
          <span
            class="px-3 py-1 rounded-full text-xs"
            [class.bg-green-100]="c.estado"
            [class.text-green-700]="c.estado"
            [class.bg-gray-200]="!c.estado"
          >
            {{ c.estado ? 'Activa' : 'Inactiva' }}
          </span>
        </div>

        <p class="text-sm text-gray-600 mt-2 line-clamp-2">
          {{ c.descripcion || 'Sin descripción' }}
        </p>

        <div class="mt-6 flex gap-3">
          <button class="flex-1 bg-black text-white py-2.5 rounded-xl text-sm" (click)="editar(c)">
            Editar
          </button>

          <button class="flex-1 bg-gray-200 py-2.5 rounded-xl text-sm" (click)="toggleEstado(c)">
            {{ c.estado ? 'Desactivar' : 'Activar' }}
          </button>
        </div>


      </div>
    }
  </div>

  <!-- MODAL -->
  @if (modalAbierto) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div class="bg-white rounded-[28px] w-full max-w-md p-6 space-y-5">
        <h2 class="text-lg font-semibold text-gray-900">
          {{ editando ? 'Editar categoría' : 'Nueva categoría' }}
        </h2>

        <div>
          <label class="text-xs text-gray-500 mb-1 block">Nombre</label>
          <input
            class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm"
            [(ngModel)]="form.nombre"
          />
        </div>

        <div>
          <label class="text-xs text-gray-500 mb-1 block">Descripción</label>
          <textarea
            rows="3"
            class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm"
            [(ngModel)]="form.descripcion"
          ></textarea>
        </div>

        <div>
          <label class="text-xs text-gray-500 mb-1 block">Ícono</label>
          <input
            class="w-full bg-gray-100 rounded-xl px-4 py-3 text-sm"
            placeholder="ej: utensils, coffee"
            [(ngModel)]="form.icono"
          />
        </div>

        <div class="flex justify-end gap-3 pt-4">
          <button class="px-4 py-2 rounded-xl border" (click)="modalAbierto = false">
            Cancelar
          </button>

          <button class="px-4 py-2 rounded-xl bg-black text-white" (click)="guardar()">
            Guardar
          </button>
        </div>
      </div>
    </div>
  }
</div>
