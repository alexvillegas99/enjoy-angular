<header
  class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 relative"
>

  <h1 class="text-sm text-gray-700">
    Hola, <span class="font-semibold">{{ nombre }}</span>
  </h1>

  <div class="flex items-center gap-4">

    <span class="text-xs text-gray-500 hidden sm:block">
      Última conexión: {{ ultimaConexion }}
    </span>

    <!-- AVATAR -->
    <div class="relative">

      <button
        (click)="toggleMenu()"
        class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300 transition"
      >
        <lucide-icon name="user" class="w-5 h-5 text-gray-600"></lucide-icon>
      </button>

      <!-- DROPDOWN -->
      @if (menuAbierto) {
        <div
          class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden z-50"
        >



          <button
            (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm hover:bg-red-50 text-red-600 flex items-center gap-2"
          >
            <lucide-icon name="log-out" class="w-4 h-4"></lucide-icon>
            Cerrar sesión
          </button>

        </div>
      }

    </div>

  </div>
</header>
